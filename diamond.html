<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wireframe Diamond</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* -------- MATERIAL -------- */

const lineMaterial = new THREE.LineBasicMaterial({
  color:0xe8edf5,
  transparent:true,
  opacity:0.55
});

const pointMaterial = new THREE.PointsMaterial({
  color:0xffffff,
  size:0.06,
  transparent:true,
  opacity:0.9
});

const group = new THREE.Group();
scene.add(group);

/* -------- BUILD DIAMOND -------- */

function ring(radius,y,count){
  let pts=[];
  for(let i=0;i<count;i++){
    let a=i/count*Math.PI*2;
    pts.push(new THREE.Vector3(
      Math.cos(a)*radius,
      y,
      Math.sin(a)*radius
    ));
  }
  return pts;
}

// layers
const table = ring(0.6,1.4,8);
const crown = ring(1.4,0.8,16);
const girdle = ring(2.2,0,20);
const pavilion = ring(1.2,-1.2,16);
const tip=[new THREE.Vector3(0,-2.4,0)];

let vertices=[...table,...crown,...girdle,...pavilion,...tip];

/* -------- CONNECT NETWORK -------- */

let linePos=[];

for(let i=0;i<vertices.length;i++){
  for(let j=i+1;j<vertices.length;j++){

    let d=vertices[i].distanceTo(vertices[j]);

    if(d<2.2){ // connect nearby vertices
      linePos.push(
        vertices[i].x,vertices[i].y,vertices[i].z,
        vertices[j].x,vertices[j].y,vertices[j].z
      );
    }
  }
}

const lineGeo=new THREE.BufferGeometry();
lineGeo.setAttribute('position',new THREE.Float32BufferAttribute(linePos,3));

const lines=new THREE.LineSegments(lineGeo,lineMaterial);
group.add(lines);

/* -------- NODES -------- */

let pts=[];
vertices.forEach(v=>pts.push(v.x,v.y,v.z));

const ptsGeo=new THREE.BufferGeometry();
ptsGeo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));

const points=new THREE.Points(ptsGeo,pointMaterial);
group.add(points);

/* -------- SCROLL INERTIA -------- */

let velocity=0;
let scrollEnergy=0;

window.addEventListener("wheel",e=>{
  velocity+=e.deltaY*0.0004;
});

/* -------- ANIMATION -------- */

let t=0;

function animate(){
requestAnimationFrame(animate);

t+=0.01;

velocity*=0.93;
scrollEnergy+=velocity;

// slow rotation
group.rotation.y += 0.002 + scrollEnergy*0.04;
group.rotation.x = Math.sin(t*0.4)*0.12;

// gentle breathing
let s=1+Math.sin(t*1.2)*0.02;
group.scale.set(s,s,s);

renderer.render(scene,camera);
}

animate();

onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>
</body>
</html>
