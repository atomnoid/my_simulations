<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Interactive Galaxy</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

/* ---------- PARTICLES ---------- */

const COUNT = 9000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(COUNT*3);
const velocities = [];

for(let i=0;i<COUNT;i++){
    let r = Math.random()*8 + 2;
    let a = Math.random()*Math.PI*2;

    positions[i*3]   = Math.cos(a)*r;
    positions[i*3+1] = Math.sin(a)*r;
    positions[i*3+2] = (Math.random()-0.5)*0.4;

    velocities.push({angle:a,radius:r});
}

geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
    color:0xffffff,
    size:0.045,
    transparent:true,
    opacity:0.9,
    blending:THREE.AdditiveBlending,
    depthWrite:false
});

const particles = new THREE.Points(geometry,material);
scene.add(particles);

/* ---------- MOUSE INTERACTION ---------- */

let targetRotX = 0;
let targetRotY = 0;
let rotX = 0;
let rotY = 0;

document.addEventListener("mousemove",e=>{
    let x = (e.clientX/innerWidth - 0.5);
    let y = (e.clientY/innerHeight - 0.5);

    targetRotY = x * 1.2;
    targetRotX = y * 0.8;
});

window.addEventListener("wheel",e=>{
    camera.position.z += e.deltaY * 0.01;
    camera.position.z = Math.max(6, Math.min(30, camera.position.z));
});

/* ---------- ANIMATION ---------- */

function animate(){
requestAnimationFrame(animate);

let pos = geometry.attributes.position.array;

for(let i=0;i<COUNT;i++){
    let v = velocities[i];

    v.radius *= 0.994;
    v.angle += 0.02 + (1/v.radius)*0.15;

    pos[i*3]   = Math.cos(v.angle)*v.radius;
    pos[i*3+1] = Math.sin(v.angle)*v.radius;

    if(v.radius < 0.4){
        v.radius = Math.random()*8 + 6;
        v.angle = Math.random()*Math.PI*2;
    }
}

geometry.attributes.position.needsUpdate=true;

/* smooth camera motion */
rotX += (targetRotX-rotX)*0.05;
rotY += (targetRotY-rotY)*0.05;

particles.rotation.x = rotX;
particles.rotation.y = rotY;

renderer.render(scene,camera);
}

animate();

/* ---------- RESIZE ---------- */

onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
