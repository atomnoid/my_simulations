<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyper Neural Field</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,#02030a,#000000 70%);
}
canvas{display:block}
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";

// ---------- SCENE ----------
const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
camera.position.z=18;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

// ---------- PARAMETERS ----------
const POINTS=900;
let dimensionT=0; // 4th dimension controlled by scroll

// ---------- CREATE NODES ----------
const positions=new Float32Array(POINTS*3);
const base=new Float32Array(POINTS*3);

for(let i=0;i<POINTS;i++){

    // random sphere distribution
    const r=Math.cbrt(Math.random())*6;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);

    base[i*3]=r*Math.sin(phi)*Math.cos(theta);
    base[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    base[i*3+2]=r*Math.cos(phi);
}

const geo=new THREE.BufferGeometry();
geo.setAttribute("position",new THREE.BufferAttribute(positions,3));

const mat=new THREE.PointsMaterial({
    color:0xe8f0ff,
    size:0.06,
    transparent:true,
    opacity:0.9
});

const points=new THREE.Points(geo,mat);
scene.add(points);

// ---------- CONNECTION LINES ----------
let connections=[];
for(let i=0;i<POINTS;i++){
 for(let j=i+1;j<POINTS;j++){
   if(Math.random()<0.0025){
     connections.push(i,j);
   }
 }
}

const lineGeo=new THREE.BufferGeometry();
const linePos=new Float32Array(connections.length*3);
lineGeo.setAttribute("position",new THREE.BufferAttribute(linePos,3));

const lineMat=new THREE.LineBasicMaterial({
color:0xbfd2ff,
transparent:true,
opacity:0.35
});

const lines=new THREE.LineSegments(lineGeo,lineMat);
scene.add(lines);

// ---------- TWO FINGER SCROLL CONTROL ----------
window.addEventListener("wheel",e=>{
dimensionT+=e.deltaY*0.0008; // only scroll controls world
});

// ---------- RESIZE ----------
window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

// ---------- ANIMATION ----------
function animate(t){
requestAnimationFrame(animate);

// 4D distortion math (the magic)
for(let i=0;i<POINTS;i++){

    let x=base[i*3];
    let y=base[i*3+1];
    let z=base[i*3+2];

    const d=Math.sqrt(x*x+y*y+z*z);

    // hyper dimensional warp
    const warp=Math.sin(d*2+dimensionT*4);

    positions[i*3]=x+Math.sin(y*1.5+dimensionT)*warp*1.2;
    positions[i*3+1]=y+Math.cos(z*1.2+dimensionT)*warp*1.2;
    positions[i*3+2]=z+Math.sin(x*1.3+dimensionT)*warp*1.2;
}
geo.attributes.position.needsUpdate=true;

// update connections
for(let k=0;k<connections.length;k+=2){
    const a=connections[k];
    const b=connections[k+1];

    linePos[k*3]=positions[a*3];
    linePos[k*3+1]=positions[a*3+1];
    linePos[k*3+2]=positions[a*3+2];

    linePos[k*3+3]=positions[b*3];
    linePos[k*3+4]=positions[b*3+1];
    linePos[k*3+5]=positions[b*3+2];
}
lineGeo.attributes.position.needsUpdate=true;

// subtle auto life motion
scene.rotation.y+=0.0008;

renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
