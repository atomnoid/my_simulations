<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Collision Event</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; cursor:grab; }
  body:active { cursor:grabbing; }
  canvas { display:block; }
  #title {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    font-family:'Courier New',monospace; font-size:9px;
    letter-spacing:9px; text-transform:uppercase;
    color:rgba(180,185,205,0.28); pointer-events:none;
    white-space:nowrap; z-index:20;
  }
  #hint {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    font-family:'Courier New',monospace; font-size:8px;
    letter-spacing:4px; text-transform:uppercase;
    color:rgba(160,165,185,0.22); pointer-events:none;
    white-space:nowrap; z-index:20;
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:10;
    background:repeating-linear-gradient(
      0deg,transparent,transparent 2px,
      rgba(0,0,0,0.035) 2px,rgba(0,0,0,0.035) 4px
    );
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Galaxy Collision Event</div>
<div id="hint">drag · scroll to zoom · right-drag to pan</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Inline OrbitControls (r128 compatible) ─────────────────────────
(function(){
  THREE.OrbitControls = function(camera, domElement){
    this.camera     = camera;
    this.domElement = domElement || document;
    this.enabled    = true;
    this.target     = new THREE.Vector3();
    this.minDistance = 30;
    this.maxDistance = 700;
    this.enableDamping  = true;
    this.dampingFactor  = 0.07;
    this.rotateSpeed    = 0.55;
    this.zoomSpeed      = 1.1;
    this.panSpeed       = 0.6;
    this.autoRotate     = false;
    this.autoRotateSpeed= 0.5;

    const scope = this;
    let   state  = -1; // -1=none 0=rotate 1=zoom 2=pan
    const ROTATE=0, ZOOM=1, PAN=2;

    const spherical    = new THREE.Spherical();
    const sphericalDelta = new THREE.Spherical();
    let   scale = 1;
    const panOffset = new THREE.Vector3();
    const rotateStart = new THREE.Vector2();
    const rotateEnd   = new THREE.Vector2();
    const rotateDelta = new THREE.Vector2();
    const panStart  = new THREE.Vector2();
    const panEnd    = new THREE.Vector2();
    const panDelta  = new THREE.Vector2();
    const zoomStart = new THREE.Vector2();
    const zoomEnd   = new THREE.Vector2();
    const zoomDelta = new THREE.Vector2();

    function getZoomScale(){ return Math.pow(0.95, scope.zoomSpeed); }

    function rotateLeft(a){ sphericalDelta.theta -= a; }
    function rotateUp(a){   sphericalDelta.phi   -= a; }

    const panLeftV  = new THREE.Vector3();
    const panUpV    = new THREE.Vector3();
    const offset    = new THREE.Vector3();
    const quat      = new THREE.Quaternion().setFromUnitVectors(camera.up, new THREE.Vector3(0,1,0));
    const quatInv   = quat.clone().inverse();

    function panLeft(dist, mtx){
      panLeftV.setFromMatrixColumn(mtx, 0);
      panLeftV.multiplyScalar(-dist);
      panOffset.add(panLeftV);
    }
    function panUp(dist, mtx){
      panUpV.setFromMatrixColumn(mtx, 1);
      panUpV.multiplyScalar(dist);
      panOffset.add(panUpV);
    }
    function pan(dx, dy){
      const el = scope.domElement;
      const h  = el === document ? window.innerHeight : el.clientHeight;
      offset.copy(camera.position).sub(scope.target);
      let dist = offset.length() * Math.tan((camera.fov/2) * Math.PI/180);
      panLeft(2*dx*dist/h, camera.matrix);
      panUp  (2*dy*dist/h, camera.matrix);
    }

    this.update = function(){
      offset.copy(camera.position).sub(scope.target);
      offset.applyQuaternion(quat);
      spherical.setFromVector3(offset);
      if(scope.autoRotate) rotateLeft(2*Math.PI/60/60*scope.autoRotateSpeed);
      spherical.theta += sphericalDelta.theta * scope.dampingFactor;
      spherical.phi   += sphericalDelta.phi   * scope.dampingFactor;
      spherical.phi    = Math.max(0.05, Math.min(Math.PI-0.05, spherical.phi));
      spherical.radius *= scale;
      spherical.radius  = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
      scope.target.addScaledVector(panOffset, scope.dampingFactor);
      panOffset.multiplyScalar(1 - scope.dampingFactor);
      sphericalDelta.theta *= (1 - scope.dampingFactor);
      sphericalDelta.phi   *= (1 - scope.dampingFactor);
      scale = 1;
      offset.setFromSpherical(spherical);
      offset.applyQuaternion(quatInv);
      camera.position.copy(scope.target).add(offset);
      camera.lookAt(scope.target);
    };

    // ── Events ──
    function onMouseDown(e){
      if(!scope.enabled) return;
      if(e.button === 0){ state = ROTATE; rotateStart.set(e.clientX, e.clientY); }
      else if(e.button === 1){ state = ZOOM; zoomStart.set(e.clientX, e.clientY); }
      else if(e.button === 2){ state = PAN; panStart.set(e.clientX, e.clientY); }
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup',   onMouseUp);
    }
    function onMouseMove(e){
      if(!scope.enabled) return;
      if(state === ROTATE){
        rotateEnd.set(e.clientX, e.clientY);
        rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
        const el = scope.domElement === document ? document.documentElement : scope.domElement;
        rotateLeft(2*Math.PI*rotateDelta.x / el.clientHeight);
        rotateUp  (2*Math.PI*rotateDelta.y / el.clientHeight);
        rotateStart.copy(rotateEnd);
      } else if(state === PAN){
        panEnd.set(e.clientX, e.clientY);
        panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
        pan(panDelta.x, panDelta.y);
        panStart.copy(panEnd);
      } else if(state === ZOOM){
        zoomEnd.set(e.clientX, e.clientY);
        zoomDelta.subVectors(zoomEnd, zoomStart);
        if(zoomDelta.y > 0) scale /= getZoomScale();
        else scale *= getZoomScale();
        zoomStart.copy(zoomEnd);
      }
    }
    function onMouseUp(){ state = -1; document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); }
    function onWheel(e){
      e.preventDefault();
      if(e.deltaY < 0) scale *= getZoomScale();
      else             scale /= getZoomScale();
    }
    function onContextMenu(e){ e.preventDefault(); }
    function onTouchStart(e){
      if(!scope.enabled) return;
      switch(e.touches.length){
        case 1: state=ROTATE; rotateStart.set(e.touches[0].pageX, e.touches[0].pageY); break;
        case 2:
          state=ZOOM;
          const dx=e.touches[0].pageX-e.touches[1].pageX;
          const dy=e.touches[0].pageY-e.touches[1].pageY;
          zoomStart.set(0, Math.sqrt(dx*dx+dy*dy)); break;
        case 3: state=PAN; panStart.set(e.touches[0].pageX, e.touches[0].pageY); break;
      }
    }
    function onTouchMove(e){
      if(!scope.enabled) return;
      e.preventDefault();
      switch(e.touches.length){
        case 1:
          rotateEnd.set(e.touches[0].pageX, e.touches[0].pageY);
          rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
          const el = scope.domElement === document ? document.documentElement : scope.domElement;
          rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);
          rotateUp  (2*Math.PI*rotateDelta.y/el.clientHeight);
          rotateStart.copy(rotateEnd); break;
        case 2:
          const dx=e.touches[0].pageX-e.touches[1].pageX;
          const dy=e.touches[0].pageY-e.touches[1].pageY;
          const dist=Math.sqrt(dx*dx+dy*dy);
          zoomEnd.set(0,dist);
          zoomDelta.subVectors(zoomEnd,zoomStart);
          if(zoomDelta.y>0) scale*=getZoomScale(); else scale/=getZoomScale();
          zoomStart.copy(zoomEnd); break;
        case 3:
          panEnd.set(e.touches[0].pageX,e.touches[0].pageY);
          panDelta.subVectors(panEnd,panStart).multiplyScalar(scope.panSpeed);
          pan(panDelta.x,panDelta.y);
          panStart.copy(panEnd); break;
      }
    }
    function onTouchEnd(){ state=-1; }
    domElement.addEventListener('mousedown',   onMouseDown);
    domElement.addEventListener('wheel',       onWheel, {passive:false});
    domElement.addEventListener('contextmenu', onContextMenu);
    domElement.addEventListener('touchstart',  onTouchStart, {passive:false});
    domElement.addEventListener('touchmove',   onTouchMove,  {passive:false});
    domElement.addEventListener('touchend',    onTouchEnd);
  };
})();

// ═══════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('c'), antialias:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x00000d, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 110, 240);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.minDistance    = 40;
controls.maxDistance    = 650;
controls.target.set(0, 0, 0);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

const rng  = (a,b) => a + Math.random()*(b-a);
const lerp = (a,b,t) => a+(b-a)*t;

// ── shared shader ──────────────────────────────────────────────
const VERT = `
  attribute float aSize;
  attribute vec3  aCol;
  varying   vec3  vCol;
  uniform   float uBright;
  uniform   float uFade;
  void main(){
    vCol = aCol * uBright;
    vec4 mv = modelViewMatrix * vec4(position,1.0);
    float dz = max(1.0,-mv.z);
    gl_PointSize = clamp(aSize*(290.0/dz), 0.3, 16.0);
    gl_Position  = projectionMatrix * mv;
  }
`;
const FRAG = `
  varying vec3  vCol;
  uniform float uFade;
  void main(){
    float d = length(gl_PointCoord-0.5)*2.0;
    if(d>1.0) discard;
    float a = smoothstep(1.0,0.0,d*d) * uFade;
    gl_FragColor = vec4(vCol, a);
  }
`;
function mkMat(b,f){
  return new THREE.ShaderMaterial({
    uniforms:{ uBright:{value:b}, uFade:{value:f} },
    vertexShader:VERT, fragmentShader:FRAG,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
}

// ═══════════════════════════════════════════════════════════════
// BUILD GALAXY
// palette: array of {t, r, g, b} color stops along radius 0→1
// ═══════════════════════════════════════════════════════════════
function buildGalaxy(N, radius, numArms, twist, palette){
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  const siz = new Float32Array(N);

  function sampleColor(t){
    // clamp
    t = Math.max(0, Math.min(1, t));
    for(let i=0; i<palette.length-1; i++){
      const a = palette[i], b = palette[i+1];
      if(t >= a.t && t <= b.t){
        const f = (t-a.t)/(b.t-a.t);
        return {
          r: lerp(a.r,b.r,f),
          g: lerp(a.g,b.g,f),
          b: lerp(a.b,b.b,f)
        };
      }
    }
    return palette[palette.length-1];
  }

  for(let i=0; i<N; i++){
    const inCore = Math.random() < 0.07;
    let r, angle;

    if(inCore){
      r     = Math.pow(Math.random(), 2.8)*radius*0.11;
      angle = Math.random()*Math.PI*2;
    } else {
      r           = Math.pow(Math.random(), 0.46)*radius;
      const arm   = Math.floor(Math.random()*numArms);
      const base  = (arm/numArms)*Math.PI*2;
      const spin  = (r/radius)*twist*Math.PI*2;
      angle       = base + spin + rng(-0.48,0.48);
    }

    const thick = radius*0.018*(1-r/radius*0.65);
    pos[i*3]   = Math.cos(angle)*r + rng(-radius*0.016,radius*0.016);
    pos[i*3+1] = rng(-thick,thick);
    pos[i*3+2] = Math.sin(angle)*r + rng(-radius*0.016,radius*0.016);

    const t   = inCore ? 0 : r/radius;
    const c   = sampleColor(t);
    const bst = inCore ? rng(0.8,1.2) : rng(0.25,0.80)*(1-t*0.45);
    col[i*3]   = Math.min(1, c.r*bst);
    col[i*3+1] = Math.min(1, c.g*bst);
    col[i*3+2] = Math.min(1, c.b*bst);

    siz[i] = inCore ? rng(2.5,5.5) : rng(0.55,2.0)*(1-t*0.4);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aCol',     new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(siz,1));
  const mat = mkMat(1.0, 1.0);
  return { mesh: new THREE.Points(geo,mat), mat, geo };
}

// ── G1: cool blue-white spiral (comes from BOTTOM-RIGHT) ──────
const PALETTE_G1 = [
  {t:0.00, r:1.00, g:1.00, b:1.00},  // core: pure white
  {t:0.08, r:0.90, g:0.92, b:1.00},  // near-core: warm white
  {t:0.30, r:0.72, g:0.76, b:0.95},  // mid: blue-white
  {t:0.65, r:0.50, g:0.55, b:0.82},  // outer: cool blue
  {t:1.00, r:0.30, g:0.35, b:0.62},  // edge: deep blue
];
const G1 = buildGalaxy(44000, 52, 3, 1.88, PALETTE_G1);
G1.mesh.rotation.x =  0.20;
G1.mesh.rotation.z =  0.05;
// starts BOTTOM-RIGHT, moves to centre
const G1_START = new THREE.Vector3( 120, -75, 20);
const G1_END   = new THREE.Vector3( -10,  -4,  0);
G1.mesh.position.copy(G1_START);
scene.add(G1.mesh);

// ── G2: pink-red-blue spiral (comes from TOP-LEFT) ───────────
const PALETTE_G2 = [
  {t:0.00, r:1.00, g:0.98, b:1.00},  // core: bright white
  {t:0.08, r:1.00, g:0.88, b:0.92},  // near-core: warm pink-white
  {t:0.25, r:0.92, g:0.55, b:0.72},  // mid-inner: pink
  {t:0.50, r:0.80, g:0.30, b:0.60},  // mid: deep pink-red
  {t:0.72, r:0.55, g:0.25, b:0.75},  // outer: purple-blue
  {t:1.00, r:0.30, g:0.18, b:0.60},  // edge: deep violet-blue
];
const G2 = buildGalaxy(36000, 44, 2, 2.10, PALETTE_G2);
G2.mesh.rotation.x =  1.18;   // tilted — edge-on look
G2.mesh.rotation.z =  0.35;
// starts TOP-LEFT, moves to centre
const G2_START = new THREE.Vector3(-118, 72, -18);
const G2_END   = new THREE.Vector3(  8,   5,   4);
G2.mesh.position.copy(G2_START);
scene.add(G2.mesh);

// ── background stars ──────────────────────────────────────────
(()=>{
  const N=8000, p=new Float32Array(N*3), c=new Float32Array(N*3), s=new Float32Array(N);
  for(let i=0;i<N;i++){
    p[i*3]=rng(-900,900); p[i*3+1]=rng(-600,600); p[i*3+2]=rng(-800,-60);
    const v=rng(0.42,0.78);
    c[i*3]=v; c[i*3+1]=v; c[i*3+2]=Math.min(1,v+rng(0,0.14));
    s[i]=Math.pow(Math.random(),2)*1.1+0.18;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(p,3));
  geo.setAttribute('aCol',    new THREE.BufferAttribute(c,3));
  geo.setAttribute('aSize',   new THREE.BufferAttribute(s,1));
  scene.add(new THREE.Points(geo,mkMat(1.0,0.5)));
})();

// ═══════════════════════════════════════════════════════════════
// STREAMING PARTICLES (stars bleeding off during approach)
// ═══════════════════════════════════════════════════════════════
const SMAX = 20000;
const sPos  = new Float32Array(SMAX*3);
const sCol  = new Float32Array(SMAX*3);
const sSiz  = new Float32Array(SMAX);
const sVel  = new Float32Array(SMAX*3);
const sLife = new Float32Array(SMAX);
let   sHead = 0;

const sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sPos,3));
sGeo.setAttribute('aCol',     new THREE.BufferAttribute(sCol,3));
sGeo.setAttribute('aSize',    new THREE.BufferAttribute(sSiz,1));
sGeo.setDrawRange(0,0);
const sMat  = mkMat(1.0,1.0);
scene.add(new THREE.Points(sGeo,sMat));

function emitStream(wx,wy,wz,rad,palette){
  const angle=Math.random()*Math.PI*2;
  const phi=(Math.random()-0.5)*Math.PI;
  const r=rng(0.25,1.05)*rad;
  const px=wx+Math.cos(angle)*Math.cos(phi)*r;
  const py=wy+Math.sin(phi)*r*0.18;
  const pz=wz+Math.sin(angle)*Math.cos(phi)*r;
  const da=angle+rng(-0.5,0.5);
  const spd=rng(0.018,0.14);
  const idx=sHead%SMAX;
  sPos[idx*3]=px; sPos[idx*3+1]=py; sPos[idx*3+2]=pz;
  sVel[idx*3]=Math.cos(da)*spd; sVel[idx*3+1]=rng(-0.012,0.012); sVel[idx*3+2]=Math.sin(da)*spd;
  sLife[idx]=rng(0.5,1.0);
  // sample a colour from this galaxy's palette
  const t=rng(0.1,0.9);
  let cc={r:0.7,g:0.7,b:0.9};
  for(let i=0;i<palette.length-1;i++){
    if(t>=palette[i].t&&t<=palette[i+1].t){
      const f=(t-palette[i].t)/(palette[i+1].t-palette[i].t);
      cc={r:lerp(palette[i].r,palette[i+1].r,f),g:lerp(palette[i].g,palette[i+1].g,f),b:lerp(palette[i].b,palette[i+1].b,f)};
    }
  }
  sCol[idx*3]=cc.r; sCol[idx*3+1]=cc.g; sCol[idx*3+2]=cc.b;
  sSiz[idx]=rng(0.25,1.0);
  sHead++;
}

// ═══════════════════════════════════════════════════════════════
// SCATTER PARTICLES (collision)
// ═══════════════════════════════════════════════════════════════
const CMAX  = 24000;
const cPos  = new Float32Array(CMAX*3);
const cCol  = new Float32Array(CMAX*3);
const cSiz  = new Float32Array(CMAX);
const cVel  = new Float32Array(CMAX*3);
const cLife = new Float32Array(CMAX);
const cFric = new Float32Array(CMAX);

const cGeo = new THREE.BufferGeometry();
cGeo.setAttribute('position', new THREE.BufferAttribute(cPos,3));
cGeo.setAttribute('aCol',     new THREE.BufferAttribute(cCol,3));
cGeo.setAttribute('aSize',    new THREE.BufferAttribute(cSiz,1));
cGeo.setDrawRange(0,0);
const cMat  = mkMat(1.0,1.0);
scene.add(new THREE.Points(cGeo,cMat));

function spawnCollision(mx,my,mz){
  for(let i=0;i<CMAX;i++){
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    const spd=Math.pow(Math.random(),1.8)*rng(0.08,2.8);
    cPos[i*3]=mx+rng(-10,10); cPos[i*3+1]=my+rng(-5,5); cPos[i*3+2]=mz+rng(-10,10);
    cVel[i*3]=Math.sin(phi)*Math.cos(theta)*spd;
    cVel[i*3+1]=Math.cos(phi)*spd*0.3;
    cVel[i*3+2]=Math.sin(phi)*Math.sin(theta)*spd;
    cLife[i]=rng(0.6,1.0);
    cFric[i]=rng(0.982,0.998);
    // mix colours from both galaxies
    const fromG2=Math.random()<0.5;
    const palette=fromG2?PALETTE_G2:PALETTE_G1;
    const t=rng(0,1);
    let cc={r:0.7,g:0.7,b:0.9};
    for(let j=0;j<palette.length-1;j++){
      if(t>=palette[j].t&&t<=palette[j+1].t){
        const f=(t-palette[j].t)/(palette[j+1].t-palette[j].t);
        cc={r:lerp(palette[j].r,palette[j+1].r,f),g:lerp(palette[j].g,palette[j+1].g,f),b:lerp(palette[j].b,palette[j+1].b,f)};
      }
    }
    cCol[i*3]=cc.r; cCol[i*3+1]=cc.g; cCol[i*3+2]=cc.b;
    cSiz[i]=rng(0.2,1.2);
  }
  cGeo.setDrawRange(0,CMAX);
  cGeo.attributes.position.needsUpdate=true;
  cGeo.attributes.aCol.needsUpdate=true;
  cGeo.attributes.aSize.needsUpdate=true;
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION STATE
// approach: slow (1200 frames ≈ 20s)
// ═══════════════════════════════════════════════════════════════
const APPROACH = 1200;
let frame = 0, phase = 'approach', postF = 0;

// self-rotation speeds (medium-slow)
const G1_SPIN =  0.00038;
const G2_SPIN = -0.00055;

const easeIO = t => t<0.5 ? 2*t*t : -1+(4-2*t)*t;

function reset(){
  frame=0; phase='approach'; postF=0;
  G1.mesh.position.copy(G1_START); G2.mesh.position.copy(G2_START);
  G1.mesh.rotation.set(0.20,0,0.05); G2.mesh.rotation.set(1.18,0,0.35);
  G1.mat.uniforms.uFade.value=1; G2.mat.uniforms.uFade.value=1;
  sLife.fill(0); sHead=0; sGeo.setDrawRange(0,0);
  cLife.fill(0); cGeo.setDrawRange(0,0);
  cMat.uniforms.uFade.value=1;
}

(function tick(){
  requestAnimationFrame(tick);
  frame++;
  controls.update();

  const t  = Math.min(frame/APPROACH,1.0);
  const et = easeIO(t);

  // move both galaxies toward centre
  G1.mesh.position.lerpVectors(G1_START, G1_END, et);
  G2.mesh.position.lerpVectors(G2_START, G2_END, et);

  // self-spin (continuous)
  G1.mesh.rotation.y += G1_SPIN;
  G2.mesh.rotation.y += G2_SPIN;

  // ── approach: emit streamers ──
  if(phase==='approach'){
    const prox = et*et;
    if(prox>0.08 && frame%2===0){
      const n=Math.floor(prox*20);
      const p1=G1.mesh.position, p2=G2.mesh.position;
      for(let i=0;i<n;i++) emitStream(p1.x,p1.y,p1.z,52,PALETTE_G1);
      for(let i=0;i<n;i++) emitStream(p2.x,p2.y,p2.z,44,PALETTE_G2);
    }
    // update streamers
    let maxIdx=0;
    for(let i=0;i<SMAX;i++){
      if(sLife[i]<=0) continue;
      sPos[i*3]  +=sVel[i*3];
      sPos[i*3+1]+=sVel[i*3+1];
      sPos[i*3+2]+=sVel[i*3+2];
      sLife[i]-=rng(0.002,0.007);
      if(sLife[i]<0) sLife[i]=0;
      if(i+1>maxIdx) maxIdx=i+1;
    }
    sGeo.setDrawRange(0,Math.min(sHead,SMAX));
    sGeo.attributes.position.needsUpdate=true;

    if(t>=1.0){
      phase='collision';
      sLife.fill(0); sGeo.setDrawRange(0,0);
      const mp=new THREE.Vector3().addVectors(G1.mesh.position,G2.mesh.position).multiplyScalar(0.5);
      spawnCollision(mp.x,mp.y,mp.z);
    }
  }

  // ── collision: fade galaxies + animate scatter ──
  if(phase==='collision'){
    postF++;
    G1.mat.uniforms.uFade.value=Math.max(0,1-postF*0.013);
    G2.mat.uniforms.uFade.value=Math.max(0,1-postF*0.015);

    let anyAlive=false;
    for(let i=0;i<CMAX;i++){
      if(cLife[i]<=0) continue;
      anyAlive=true;
      cPos[i*3]  +=cVel[i*3];   cPos[i*3+1]+=cVel[i*3+1]; cPos[i*3+2]+=cVel[i*3+2];
      cVel[i*3]  *=cFric[i];    cVel[i*3+1]*=cFric[i];     cVel[i*3+2]*=cFric[i];
      cLife[i]-=rng(0.0015,0.005);
    }
    cGeo.attributes.position.needsUpdate=true;
    cMat.uniforms.uFade.value=Math.max(0,1-postF/420);

    if(postF>620) reset();3
    
  }

  renderer.render(scene,camera);
})();
</script>
