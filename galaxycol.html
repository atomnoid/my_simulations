<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Collision Event</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; cursor:grab; }
  body:active { cursor:grabbing; }
  canvas { display:block; }
  #title {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    font-family:'Courier New',monospace; font-size:9px;
    letter-spacing:9px; text-transform:uppercase;
    color:rgba(180,185,205,0.28); pointer-events:none;
    white-space:nowrap; z-index:20;
  }
  #hint {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    font-family:'Courier New',monospace; font-size:8px;
    letter-spacing:4px; text-transform:uppercase;
    color:rgba(160,165,185,0.22); pointer-events:none;
    white-space:nowrap; z-index:20;
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:10;
    background:repeating-linear-gradient(
      0deg,transparent,transparent 2px,
      rgba(0,0,0,0.035) 2px,rgba(0,0,0,0.035) 4px
    );

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Galaxy Collision Event</div>
<div id="hint">drag · scroll to zoom · right-drag to pan</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Inline OrbitControls ───────────────────────────────────────
(function(){
  THREE.OrbitControls = function(camera, domElement){
    this.camera=camera; this.domElement=domElement||document;
    this.enabled=true; this.target=new THREE.Vector3();
    this.minDistance=30; this.maxDistance=700;
    this.enableDamping=true; this.dampingFactor=0.07;
    this.rotateSpeed=0.55; this.zoomSpeed=1.1; this.panSpeed=0.6;
    const scope=this;
    let state=-1;
    const ROTATE=0,ZOOM=1,PAN=2;
    const sph=new THREE.Spherical(), sphD=new THREE.Spherical();
    let scale=1;
    const panOff=new THREE.Vector3();
    const rS=new THREE.Vector2(),rE=new THREE.Vector2(),rD=new THREE.Vector2();
    const pS=new THREE.Vector2(),pE=new THREE.Vector2(),pD=new THREE.Vector2();
    const zS=new THREE.Vector2(),zE=new THREE.Vector2(),zD=new THREE.Vector2();
    const quat=new THREE.Quaternion().setFromUnitVectors(camera.up,new THREE.Vector3(0,1,0));
    const quatI=quat.clone().inverse();
    const offset=new THREE.Vector3();
    const pLV=new THREE.Vector3(),pUV=new THREE.Vector3();
    function gZS(){return Math.pow(0.95,scope.zoomSpeed);}
    function rL(a){sphD.theta-=a;} function rU(a){sphD.phi-=a;}
    function panL(d,m){pLV.setFromMatrixColumn(m,0);pLV.multiplyScalar(-d);panOff.add(pLV);}
    function panUp(d,m){pUV.setFromMatrixColumn(m,1);pUV.multiplyScalar(d);panOff.add(pUV);}
    function pan(dx,dy){
      const el=scope.domElement;const h=el===document?window.innerHeight:el.clientHeight;
      offset.copy(camera.position).sub(scope.target);
      let d=offset.length()*Math.tan((camera.fov/2)*Math.PI/180);
      panL(2*dx*d/h,camera.matrix);panUp(2*dy*d/h,camera.matrix);
    }
    this.update=function(){
      offset.copy(camera.position).sub(scope.target);
      offset.applyQuaternion(quat);sph.setFromVector3(offset);
      sph.theta+=sphD.theta*scope.dampingFactor;
      sph.phi+=sphD.phi*scope.dampingFactor;
      sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi));
      sph.radius*=scale;sph.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,sph.radius));
      scope.target.addScaledVector(panOff,scope.dampingFactor);
      panOff.multiplyScalar(1-scope.dampingFactor);
      sphD.theta*=(1-scope.dampingFactor);sphD.phi*=(1-scope.dampingFactor);
      scale=1;offset.setFromSpherical(sph);offset.applyQuaternion(quatI);
      camera.position.copy(scope.target).add(offset);camera.lookAt(scope.target);
    };
    function onMD(e){
      if(!scope.enabled)return;
      if(e.button===0){state=ROTATE;rS.set(e.clientX,e.clientY);}
      else if(e.button===1){state=ZOOM;zS.set(e.clientX,e.clientY);}
      else if(e.button===2){state=PAN;pS.set(e.clientX,e.clientY);}
      document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU);
    }
    function onMM(e){
      if(!scope.enabled)return;
      if(state===ROTATE){
        rE.set(e.clientX,e.clientY);rD.subVectors(rE,rS).multiplyScalar(scope.rotateSpeed);
        const el=scope.domElement===document?document.documentElement:scope.domElement;
        rL(2*Math.PI*rD.x/el.clientHeight);rU(2*Math.PI*rD.y/el.clientHeight);rS.copy(rE);
      }else if(state===PAN){
        pE.set(e.clientX,e.clientY);pD.subVectors(pE,pS).multiplyScalar(scope.panSpeed);
        pan(pD.x,pD.y);pS.copy(pE);
      }else if(state===ZOOM){
        zE.set(e.clientX,e.clientY);zD.subVectors(zE,zS);
        if(zD.y>0)scale/=gZS();else scale*=gZS();zS.copy(zE);
      }
    }
    function onMU(){state=-1;document.removeEventListener('mousemove',onMM);document.removeEventListener('mouseup',onMU);}
    function onW(e){e.preventDefault();if(e.deltaY<0)scale*=gZS();else scale/=gZS();}
    function onCM(e){e.preventDefault();}
    function onTS(e){
      if(!scope.enabled)return;
      if(e.touches.length===1){state=ROTATE;rS.set(e.touches[0].pageX,e.touches[0].pageY);}
      else if(e.touches.length===2){state=ZOOM;const dx=e.touches[0].pageX-e.touches[1].pageX,dy=e.touches[0].pageY-e.touches[1].pageY;zS.set(0,Math.sqrt(dx*dx+dy*dy));}
      else if(e.touches.length===3){state=PAN;pS.set(e.touches[0].pageX,e.touches[0].pageY);}
    }
    function onTM(e){
      if(!scope.enabled)return;e.preventDefault();
      if(e.touches.length===1){
        rE.set(e.touches[0].pageX,e.touches[0].pageY);rD.subVectors(rE,rS).multiplyScalar(scope.rotateSpeed);
        const el=scope.domElement===document?document.documentElement:scope.domElement;
        rL(2*Math.PI*rD.x/el.clientHeight);rU(2*Math.PI*rD.y/el.clientHeight);rS.copy(rE);
      }else if(e.touches.length===2){
        const dx=e.touches[0].pageX-e.touches[1].pageX,dy=e.touches[0].pageY-e.touches[1].pageY,d=Math.sqrt(dx*dx+dy*dy);
        zE.set(0,d);zD.subVectors(zE,zS);if(zD.y>0)scale*=gZS();else scale/=gZS();zS.copy(zE);
      }else if(e.touches.length===3){
        pE.set(e.touches[0].pageX,e.touches[0].pageY);pD.subVectors(pE,pS).multiplyScalar(scope.panSpeed);
        pan(pD.x,pD.y);pS.copy(pE);
      }
    }
    function onTE(){state=-1;}
    domElement.addEventListener('mousedown',onMD);
    domElement.addEventListener('wheel',onW,{passive:false});
    domElement.addEventListener('contextmenu',onCM);
    domElement.addEventListener('touchstart',onTS,{passive:false});
    domElement.addEventListener('touchmove',onTM,{passive:false});
    domElement.addEventListener('touchend',onTE);
  };
})();

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x00000d,1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,5000);
camera.position.set(0,110,240);
camera.lookAt(0,0,0);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.07;
controls.minDistance=40; controls.maxDistance=650;

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

const rng  = (a,b)=>a+Math.random()*(b-a);
const lerp = (a,b,t)=>a+(b-a)*t;

// ── Shared point shader ───────────────────────────────────────
const VERT=`
  attribute float aSize;
  attribute vec3  aCol;
  varying   vec3  vCol;
  uniform   float uBright;
  uniform   float uFade;
  void main(){
    vCol=aCol*uBright;
    vec4 mv=modelViewMatrix*vec4(position,1.0);
    float dz=max(1.0,-mv.z);
    gl_PointSize=clamp(aSize*(290.0/dz),0.3,16.0);
    gl_Position=projectionMatrix*mv;
  }
`;
const FRAG=`
  varying vec3  vCol;
  uniform float uFade;
  void main(){
    float d=length(gl_PointCoord-0.5)*2.0;
    if(d>1.0)discard;
    float a=smoothstep(1.0,0.0,d*d)*uFade;
    gl_FragColor=vec4(vCol,a);
  }
`;
function mkMat(b,f){
  return new THREE.ShaderMaterial({
    uniforms:{uBright:{value:b},uFade:{value:f}},
    vertexShader:VERT,fragmentShader:FRAG,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
}

// ── Build galaxy ──────────────────────────────────────────────
function buildGalaxy(N,radius,numArms,twist,palette){
  const pos=new Float32Array(N*3);
  const col=new Float32Array(N*3);
  const siz=new Float32Array(N);

  function sampleCol(t){
    t=Math.max(0,Math.min(1,t));
    for(let i=0;i<palette.length-1;i++){
      const a=palette[i],b=palette[i+1];
      if(t>=a.t&&t<=b.t){
        const f=(t-a.t)/(b.t-a.t);
        return{r:lerp(a.r,b.r,f),g:lerp(a.g,b.g,f),b:lerp(a.b,b.b,f)};
      }
    }
    return palette[palette.length-1];
  }

  for(let i=0;i<N;i++){
    const inCore=Math.random()<0.07;
    let r,angle;
    if(inCore){
      r=Math.pow(Math.random(),2.8)*radius*0.11;
      angle=Math.random()*Math.PI*2;
    }else{
      r=Math.pow(Math.random(),0.46)*radius;
      const arm=Math.floor(Math.random()*numArms);
      const base=(arm/numArms)*Math.PI*2;
      const spin=(r/radius)*twist*Math.PI*2;
      angle=base+spin+rng(-0.48,0.48);
    }
    const thick=radius*0.018*(1-r/radius*0.65);
    pos[i*3]  =Math.cos(angle)*r+rng(-radius*0.016,radius*0.016);
    pos[i*3+1]=rng(-thick,thick);
    pos[i*3+2]=Math.sin(angle)*r+rng(-radius*0.016,radius*0.016);

    const t=inCore?0:r/radius;
    const c=sampleCol(t);
    const bst=inCore?rng(0.8,1.2):rng(0.25,0.80)*(1-t*0.45);
    col[i*3]  =Math.min(1,c.r*bst);
    col[i*3+1]=Math.min(1,c.g*bst);
    col[i*3+2]=Math.min(1,c.b*bst);
    siz[i]=inCore?rng(2.5,5.5):rng(0.55,2.0)*(1-t*0.4);
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aCol',    new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize',   new THREE.BufferAttribute(siz,1));
  const mat=mkMat(1.0,1.0);
  return{mesh:new THREE.Points(geo,mat),mat,geo};
}

// ── G1: cool blue-white (bottom-right → centre) ──────────────
const PALETTE_G1=[
  {t:0.00,r:1.00,g:1.00,b:1.00},
  {t:0.08,r:0.90,g:0.92,b:1.00},
  {t:0.30,r:0.72,g:0.76,b:0.95},
  {t:0.65,r:0.50,g:0.55,b:0.82},
  {t:1.00,r:0.30,g:0.35,b:0.62},
];
const G1=buildGalaxy(44000,52,3,1.88,PALETTE_G1);
G1.mesh.rotation.x=0.20;
G1.mesh.rotation.z=0.05;
const G1_START=new THREE.Vector3(120,-75,20);
const G1_END  =new THREE.Vector3(-10, -4, 0);
G1.mesh.position.copy(G1_START);
scene.add(G1.mesh);

// ── G2: pink-red-blue (top-left → centre) ────────────────────
const PALETTE_G2=[
  {t:0.00,r:1.00,g:0.98,b:1.00},
  {t:0.08,r:1.00,g:0.88,b:0.92},
  {t:0.25,r:0.92,g:0.55,b:0.72},
  {t:0.50,r:0.80,g:0.30,b:0.60},
  {t:0.72,r:0.55,g:0.25,b:0.75},
  {t:1.00,r:0.30,g:0.18,b:0.60},
];
const G2=buildGalaxy(36000,44,2,2.10,PALETTE_G2);
G2.mesh.rotation.x=1.18;
G2.mesh.rotation.z=0.35;
const G2_START=new THREE.Vector3(-118,72,-18);
const G2_END  =new THREE.Vector3(   8, 5,  4);
G2.mesh.position.copy(G2_START);
scene.add(G2.mesh);

// ── Background stars — 3 dense layers ────────────────────────
(()=>{
  // Layer 1: deep field — very dim, tiny, massive spread
  const N1=18000,p1=new Float32Array(N1*3),c1=new Float32Array(N1*3),s1=new Float32Array(N1);
  for(let i=0;i<N1;i++){
    p1[i*3]=rng(-1200,1200);p1[i*3+1]=rng(-900,900);p1[i*3+2]=rng(-1200,-200);
    const v=rng(0.25,0.55);c1[i*3]=v;c1[i*3+1]=v;c1[i*3+2]=Math.min(1,v+rng(0,0.18));
    s1[i]=Math.pow(Math.random(),3)*0.7+0.12;
  }
  const g1=new THREE.BufferGeometry();
  g1.setAttribute('position',new THREE.BufferAttribute(p1,3));
  g1.setAttribute('aCol',    new THREE.BufferAttribute(c1,3));
  g1.setAttribute('aSize',   new THREE.BufferAttribute(s1,1));
  scene.add(new THREE.Points(g1,mkMat(1.0,0.38)));

  // Layer 2: mid field
  const N2=10000,p2=new Float32Array(N2*3),c2=new Float32Array(N2*3),s2=new Float32Array(N2);
  for(let i=0;i<N2;i++){
    p2[i*3]=rng(-900,900);p2[i*3+1]=rng(-700,700);p2[i*3+2]=rng(-700,-100);
    const v=rng(0.40,0.72);c2[i*3]=v;c2[i*3+1]=v;c2[i*3+2]=Math.min(1,v+rng(0,0.14));
    s2[i]=Math.pow(Math.random(),2)*1.0+0.18;
  }
  const g2=new THREE.BufferGeometry();
  g2.setAttribute('position',new THREE.BufferAttribute(p2,3));
  g2.setAttribute('aCol',    new THREE.BufferAttribute(c2,3));
  g2.setAttribute('aSize',   new THREE.BufferAttribute(s2,1));
  scene.add(new THREE.Points(g2,mkMat(1.0,0.50)));

  // Layer 3: near bright accents
  const N3=3000,p3=new Float32Array(N3*3),c3=new Float32Array(N3*3),s3=new Float32Array(N3);
  for(let i=0;i<N3;i++){
    p3[i*3]=rng(-700,700);p3[i*3+1]=rng(-500,500);p3[i*3+2]=rng(-400,-50);
    const v=rng(0.60,0.90);c3[i*3]=v;c3[i*3+1]=v;c3[i*3+2]=Math.min(1,v+rng(0,0.12));
    s3[i]=rng(0.5,1.6);
  }
  const g3=new THREE.BufferGeometry();
  g3.setAttribute('position',new THREE.BufferAttribute(p3,3));
  g3.setAttribute('aCol',    new THREE.BufferAttribute(c3,3));
  g3.setAttribute('aSize',   new THREE.BufferAttribute(s3,1));
  scene.add(new THREE.Points(g3,mkMat(1.0,0.65)));
})();

// ── Streaming particles ───────────────────────────────────────
const SMAX=20000;
const sPos=new Float32Array(SMAX*3),sCol=new Float32Array(SMAX*3);
const sSiz=new Float32Array(SMAX),sVel=new Float32Array(SMAX*3),sLife=new Float32Array(SMAX);
let sHead=0;
const sGeo=new THREE.BufferGeometry();
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
sGeo.setAttribute('aCol',    new THREE.BufferAttribute(sCol,3));
sGeo.setAttribute('aSize',   new THREE.BufferAttribute(sSiz,1));
sGeo.setDrawRange(0,0);
const sMat=mkMat(1.0,1.0);
scene.add(new THREE.Points(sGeo,sMat));

function emitStream(wx,wy,wz,rad,palette){
  const angle=Math.random()*Math.PI*2;
  const phi=(Math.random()-0.5)*Math.PI;
  const r=rng(0.25,1.05)*rad;
  const px=wx+Math.cos(angle)*Math.cos(phi)*r;
  const py=wy+Math.sin(phi)*r*0.18;
  const pz=wz+Math.sin(angle)*Math.cos(phi)*r;
  const da=angle+rng(-0.5,0.5),spd=rng(0.018,0.14);
  const idx=sHead%SMAX;
  sPos[idx*3]=px;sPos[idx*3+1]=py;sPos[idx*3+2]=pz;
  sVel[idx*3]=Math.cos(da)*spd;sVel[idx*3+1]=rng(-0.012,0.012);sVel[idx*3+2]=Math.sin(da)*spd;
  sLife[idx]=rng(0.5,1.0);
  const t=rng(0.1,0.9);let cc={r:0.7,g:0.7,b:0.9};
  for(let i=0;i<palette.length-1;i++){
    if(t>=palette[i].t&&t<=palette[i+1].t){
      const f=(t-palette[i].t)/(palette[i+1].t-palette[i].t);
      cc={r:lerp(palette[i].r,palette[i+1].r,f),g:lerp(palette[i].g,palette[i+1].g,f),b:lerp(palette[i].b,palette[i+1].b,f)};
    }
  }
  sCol[idx*3]=cc.r;sCol[idx*3+1]=cc.g;sCol[idx*3+2]=cc.b;
  sSiz[idx]=rng(0.25,1.0);sHead++;
}

// ── Collision scatter ─────────────────────────────────────────
const CMAX=24000;
const cPos=new Float32Array(CMAX*3),cCol=new Float32Array(CMAX*3);
const cSiz=new Float32Array(CMAX),cVel=new Float32Array(CMAX*3);
const cLife=new Float32Array(CMAX),cFric=new Float32Array(CMAX);
const cGeo=new THREE.BufferGeometry();
cGeo.setAttribute('position',new THREE.BufferAttribute(cPos,3));
cGeo.setAttribute('aCol',    new THREE.BufferAttribute(cCol,3));
cGeo.setAttribute('aSize',   new THREE.BufferAttribute(cSiz,1));
cGeo.setDrawRange(0,0);
const cMat=mkMat(1.0,1.0);
scene.add(new THREE.Points(cGeo,cMat));

function spawnCollision(mx,my,mz){
  for(let i=0;i<CMAX;i++){
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    const spd=Math.pow(Math.random(),1.8)*rng(0.04,1.6);
    cPos[i*3]=mx+rng(-10,10);cPos[i*3+1]=my+rng(-5,5);cPos[i*3+2]=mz+rng(-10,10);
    cVel[i*3]=Math.sin(phi)*Math.cos(theta)*spd;
    cVel[i*3+1]=Math.cos(phi)*spd*0.3;
    cVel[i*3+2]=Math.sin(phi)*Math.sin(theta)*spd;
    cLife[i]=rng(0.6,1.0);cFric[i]=rng(0.982,0.998);
    const fromG2=Math.random()<0.5;
    const palette=fromG2?PALETTE_G2:PALETTE_G1;
    const t=rng(0,1);let cc={r:0.7,g:0.7,b:0.9};
    for(let j=0;j<palette.length-1;j++){
      if(t>=palette[j].t&&t<=palette[j+1].t){
        const f=(t-palette[j].t)/(palette[j+1].t-palette[j].t);
        cc={r:lerp(palette[j].r,palette[j+1].r,f),g:lerp(palette[j].g,palette[j+1].g,f),b:lerp(palette[j].b,palette[j+1].b,f)};
      }
    }
    cCol[i*3]=cc.r;cCol[i*3+1]=cc.g;cCol[i*3+2]=cc.b;
    cSiz[i]=rng(0.2,1.2);
  }
  cGeo.setDrawRange(0,CMAX);
  cGeo.attributes.position.needsUpdate=true;
  cGeo.attributes.aCol.needsUpdate=true;
  cGeo.attributes.aSize.needsUpdate=true;
}

// ── Animation ─────────────────────────────────────────────────
const APPROACH=5000; // ~83s ultra slow cinematic
let frame=0,phase='approach',postF=0;

const G1_SPIN= 0.00055;  // very slow visible rotation
const G2_SPIN=-0.00068;

const easeIO=t=>t<0.5?2*t*t:-1+(4-2*t)*t;

function reset(){
  frame=0;phase='approach';postF=0;
  G1.mesh.position.copy(G1_START);G2.mesh.position.copy(G2_START);
  G1.mesh.rotation.set(0.20,0,0.05);G2.mesh.rotation.set(1.18,0,0.35);
  G1.mat.uniforms.uFade.value=1;G2.mat.uniforms.uFade.value=1;
  sLife.fill(0);sHead=0;sGeo.setDrawRange(0,0);
  cLife.fill(0);cGeo.setDrawRange(0,0);cMat.uniforms.uFade.value=1;
}

(function tick(){
  requestAnimationFrame(tick);
  frame++;
  controls.update();

  const t =Math.min(frame/APPROACH,1.0);
  const et=easeIO(t);

  // Move both toward centre
  G1.mesh.position.lerpVectors(G1_START,G1_END,et);
  G2.mesh.position.lerpVectors(G2_START,G2_END,et);

  // Rotate each galaxy on its own Y axis — clearly visible spin
  G1.mesh.rotation.y+=G1_SPIN;
  G2.mesh.rotation.y+=G2_SPIN;

  // approach
  if(phase==='approach'){
    const prox=et*et;
    if(prox>0.08&&frame%2===0){
      const n=Math.floor(prox*20);
      const p1=G1.mesh.position,p2=G2.mesh.position;
      for(let i=0;i<n;i++)emitStream(p1.x,p1.y,p1.z,52,PALETTE_G1);
      for(let i=0;i<n;i++)emitStream(p2.x,p2.y,p2.z,44,PALETTE_G2);
    }
    for(let i=0;i<SMAX;i++){
      if(sLife[i]<=0)continue;
      sPos[i*3]+=sVel[i*3];sPos[i*3+1]+=sVel[i*3+1];sPos[i*3+2]+=sVel[i*3+2];
      sLife[i]-=rng(0.0003,0.001);if(sLife[i]<0)sLife[i]=0;
    }
    sGeo.setDrawRange(0,Math.min(sHead,SMAX));
    sGeo.attributes.position.needsUpdate=true;

    if(t>=1.0){
      phase='collision';
      sLife.fill(0);sGeo.setDrawRange(0,0);
      const mp=new THREE.Vector3().addVectors(G1.mesh.position,G2.mesh.position).multiplyScalar(0.5);
      spawnCollision(mp.x,mp.y,mp.z);
    }
  }

  // collision
  if(phase==='collision'){
    postF++;
    G1.mat.uniforms.uFade.value=Math.max(0,1-postF*0.002);
    G2.mat.uniforms.uFade.value=Math.max(0,1-postF*0.0025);
    for(let i=0;i<CMAX;i++){
      if(cLife[i]<=0)continue;
      cPos[i*3]+=cVel[i*3];cPos[i*3+1]+=cVel[i*3+1];cPos[i*3+2]+=cVel[i*3+2];
      cVel[i*3]*=cFric[i];cVel[i*3+1]*=cFric[i];cVel[i*3+2]*=cFric[i];
      cLife[i]-=rng(0.0002,0.0008);
    }
    cGeo.attributes.position.needsUpdate=true;
    cMat.uniforms.uFade.value=Math.max(0,1-postF/1800);
    if(postF>2400)reset();
  }

  renderer.render(scene,camera);
})();
</script>
