<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Living Attractor — Slow Birth</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{display:block;}
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// ================= Scene =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60, window.innerWidth/window.innerHeight, 0.1, 1000
);
camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000,1);
document.body.appendChild(renderer.domElement);

// ================= Particles =================
const MAX_POINTS = 550000;
const positions = new Float32Array(MAX_POINTS*3);

const geometry = new THREE.BufferGeometry();
geometry.setAttribute("position", new THREE.BufferAttribute(positions,3));
geometry.setDrawRange(0,0);

const material = new THREE.PointsMaterial({
size:0.025,
color:0x2aff88,            // dim hacker green
transparent:true,
opacity:0.35,
blending:THREE.AdditiveBlending,
depthWrite:false
});

const particles = new THREE.Points(geometry,material);
scene.add(particles);

// ================= Lorenz System =================
let x=0.01,y=0,z=0;
const sigma=10, rho=28, beta=8/3;
const dt=0.005;

let index=0;
let built=false;
let t=0;

// ================= Animation =================
function animate(){
requestAnimationFrame(animate);

// ultra slow birth time
t += 0.00035;

let iterationsPerFrame;

if(!built){

    // dormant → awakening → bloom
    const growth = Math.pow(Math.max(0, t-0.15),4);
    iterationsPerFrame = Math.floor(1 + 1800 * growth);

    if(iterationsPerFrame < 1) iterationsPerFrame = 1;
    if(iterationsPerFrame > 2500) iterationsPerFrame = 2500;

}else{
    iterationsPerFrame = 2500; // alive state
}

for(let i=0;i<iterationsPerFrame;i++){

    const dx=sigma*(y-x);
    const dy=x*(rho-z)-y;
    const dz=x*y-beta*z;

    x+=dx*dt;
    y+=dy*dt;
    z+=dz*dt;

    const scale=0.45;

    positions[index*3]=x*scale;
    positions[index*3+1]=y*scale;
    positions[index*3+2]=z*scale;

    index++;

    if(index>=MAX_POINTS){
        index=0;
        built=true; // becomes permanently alive
    }
}

geometry.setDrawRange(0, built ? MAX_POINTS : index);
geometry.attributes.position.needsUpdate=true;

renderer.render(scene,camera);
}
animate();

// ================= Resize =================
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
